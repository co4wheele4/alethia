name: E2E Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

permissions:
  contents: read

jobs:
  e2e:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: aletheia-frontend/package-lock.json
      
      - name: Install dependencies
        working-directory: aletheia-frontend
        run: npm ci
      
      - name: Install Playwright browsers
        working-directory: aletheia-frontend
        run: npx playwright install --with-deps
      
      - name: Run E2E tests
        working-directory: aletheia-frontend
        run: npm run test:e2e
      
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: aletheia-frontend/playwright-report/
          retention-days: 30
