# ADR-025: mechanical governance only — diff scan, schema lint, snapshot gate, tests.
# No inference, ranking, or interpretation in this workflow.

name: Governance Bot

on:
  pull_request:
    types: [opened, synchronize, reopened]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  governance-bot:
    name: governance-bot
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository (full history for diff range)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate GraphQL schema
        run: npm run schema:generate

      - name: Enforce schema snapshot (generated schema matches committed snapshot)
        run: npm run test:schema-snapshot

      # PR: base/head from payload. Push: event.before vs github.sha; empty before → HEAD~1..HEAD.
      - name: Set BASE_SHA and HEAD_SHA (GitHub event, else HEAD~1..HEAD)
        shell: bash
        run: |
          set -euo pipefail
          zero="0000000000000000000000000000000000000000"
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE_SHA="${{ github.event.pull_request.base.sha }}"
            HEAD_SHA="${{ github.event.pull_request.head.sha }}"
          else
            BASE_SHA="${{ github.event.before }}"
            HEAD_SHA="${{ github.sha }}"
          fi
          if [ -z "${BASE_SHA}" ] || [ "${BASE_SHA}" = "${zero}" ]; then
            BASE_SHA="$(git rev-parse HEAD~1)"
          fi
          if [ -z "${HEAD_SHA}" ]; then
            HEAD_SHA="$(git rev-parse HEAD)"
          fi
          {
            echo "BASE_SHA=${BASE_SHA}"
            echo "HEAD_SHA=${HEAD_SHA}"
          } >> "${GITHUB_ENV}"

      - name: Run Governance Bot CLI (PR diff + schema + gatekeeper checks)
        shell: bash
        run: |
          set -euo pipefail
          node tools/governance-bot/governance-bot.cjs --base "${BASE_SHA}" --head "${HEAD_SHA}"

      - name: Run unit tests (guardrails and governance bot)
        run: npm test
